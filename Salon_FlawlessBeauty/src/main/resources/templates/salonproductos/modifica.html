<!DOCTYPE html>
<!--
    Encargado para Jose
-->
<html xmlns:th="http://www.thymeleaf.org">

    <head th:replace="general/fragmentos :: head"></head>

    <body>

        <header th:replace="general/fragmentos :: header"></header>

        <div class="container mt-5">

            <h2 th:text="${producto.id == null} ? 'Agregar Producto' : 'Modificar Producto'"></h2>

            <form th:action="@{/salonproductos/guardar}"
                  th:object="${producto}"
                  method="post">

                <input type="hidden" th:field="*{id}">

                <div class="mb-3">
                    <label class="form-label">Nombre</label>
                    <input type="text"
                           class="form-control"
                           th:field="*{nombre}"
                           required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Descripción</label>
                    <input type="text"
                           class="form-control"
                           th:field="*{descripcion}">
                </div>

                <div class="mb-3">
                    <label class="form-label">Precio</label>
                    <input type="number"
                           step="0.01"
                           class="form-control"
                           th:field="*{precio}"
                           required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Stock</label>
                    <input type="number"
                           class="form-control"
                           th:field="*{stock}"
                           required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Categoría</label>

                    <select class="form-select"
                            th:field="*{categoria}">

                        <option th:each="c : ${categorias}"
                                th:value="${c.id}"
                                th:text="${c.nombre}">
                        </option>

                    </select>

                </div>

                <button type="submit" class="btn btn-success">
                    Guardar
                </button>

                <a th:href="@{/salonproductos}"
                   class="btn btn-secondary">
                    Cancelar
                </a>

            </form>

        </div>

        <footer th:replace="general/fragmentos :: footer"></footer>

    </body>
</html>
