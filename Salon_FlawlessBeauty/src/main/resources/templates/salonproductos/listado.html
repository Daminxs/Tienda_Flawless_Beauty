<!DOCTYPE html>
<!--
    Encargado para Jose
-->
<html xmlns:th="http://www.thymeleaf.org">

    <head th:replace="general/fragmentos :: head"></head>

    <body>

        <header th:replace="general/fragmentos :: header"></header>

        <div class="container-fluid mt-4">

            <div class="row">

                <!-- CATEGORÍAS -->
                <div class="col-md-3">

                    <h4 class="mb-3">Categorías</h4>

                    <div class="list-group">

                        <a th:href="@{/salonproductos}"
                           class="list-group-item list-group-item-action">
                            Todos
                        </a>

                        <a th:each="c : ${categorias}"
                           th:href="@{/salonproductos(categoria=${c.id})}"
                           class="list-group-item list-group-item-action"
                           th:text="${c.nombre}">
                        </a>

                    </div>

                </div>


                <!-- PRODUCTOS -->
                <div class="col-md-9">

                    <div class="row">

                        <div class="col-md-4 mb-4"
                             th:each="producto : ${productos}">

                            <div class="card h-100 shadow-sm">

                                <img th:src="@{/img/productos/default.jpg}"
                                     class="card-img-top">

                                <div class="card-body">

                                    <h5 class="card-title"
                                        th:text="${producto.nombre}">
                                    </h5>

                                    <p class="card-text"
                                       th:text="${producto.descripcion}">
                                    </p>

                                    <p class="fw-bold">
                                        ₡<span th:text="${producto.precio}"></span>
                                    </p>

                                    <a th:href="@{/reservarProducto/{id}(id=${producto.id})}"
                                       class="btn btn-primary w-100">
                                        Reservar
                                    </a>

                                </div>

                            </div>

                        </div>

                    </div>

                </div>

            </div>

        </div>

        <footer th:replace="general/fragmentos :: footer"></footer>

    </body>
</html>
