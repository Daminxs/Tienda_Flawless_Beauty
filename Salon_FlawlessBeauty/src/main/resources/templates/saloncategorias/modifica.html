<!DOCTYPE html>
<!--
    Encargado para Damian
-->
<html xmlns:th="http://www.thymeleaf.org">

    <head th:replace="~{general/fragmentos :: head}"></head>

    <body>

        <header th:replace="~{general/fragmentos :: header}"></header>

        <section class="container mt-5">

            <div class="d-flex justify-content-between mb-3">

                <h2>Categorías del Salón</h2>

                <a th:href="@{/categoria/nuevo}" class="btn btn-primary">
                    Nueva Categoría
                </a>

            </div>

            <table class="table table-bordered table-hover">

                <thead class="table-light">

                    <tr>
                        <th>ID</th>
                        <th>Nombre</th>
                        <th class="text-center">Acciones</th>
                    </tr>

                </thead>

                <tbody>

                    <tr th:each="categoria : ${categorias}">

                        <td th:text="${categoria.id}"></td>

                        <td th:text="${categoria.nombre}"></td>

                        <td class="text-center">

                            <a th:href="@{/categoria/modificar/{id}(id=${categoria.id})}"
                               class="btn btn-warning btn-sm">
                                Editar
                            </a>

                            <a th:href="@{/categoria/eliminar/{id}(id=${categoria.id})}"
                               class="btn btn-danger btn-sm">
                                Eliminar
                            </a>

                        </td>

                    </tr>

                </tbody>

            </table>

        </section>

        <footer th:replace="~{general/fragmentos :: footer}"></footer>

    </body>
</html>
