<!DOCTYPE html>
<!--
    Encargado para Daniela
-->
<html xmlns:th="http://www.thymeleaf.org">

    <head th:replace="general/fragmentos :: head"></head>

    <body>

        <header th:replace="general/fragmentos :: header"></header>

        <main class="container mt-5">

            <div class="row justify-content-center">

                <div class="col-md-6">

                    <div class="card shadow p-4">

                        <h3 class="text-center mb-4">Crear Cuenta</h3>
                        
                        <p th:if="${error}" style="color:red;">
                            <span th:text="${error}"></span>
                        </p>

                        <form th:action="@{/registro}" method="post">

                        <div class="mb-3">
                            <label class="form-label">Nombre</label>
                            <input type="text"
                                   name="nombre"
                                   class="form-control"
                                   placeholder="Ingrese su nombre"
                                   required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Correo</label>
                            <input type="email"
                                   name="correo"
                                   class="form-control"
                                   placeholder="Ingrese su correo"
                                   required>
                        </div>
                            
                            <div class="mb-3">
                                <label class="form-label">Teléfono</label>
                                <input type="tel"
                                       name="telefono"
                                       class="form-control"
                                       placeholder="Ingrese su número de teléfono"
                                       pattern="[0-9]{8}"
                                       title="Ingrese un número de 8 dígitos"
                                       required>
                            </div>

                        <div class="mb-3">
                            <label class="form-label">Contraseña</label>
                            <input type="password"
                                   name="password"
                                   class="form-control"
                                   placeholder="Ingrese su contraseña"
                                   required>
                        </div>

                            <div class="d-grid">
                                <button type="submit" class="btn btn-outline-danger">
                                    Registrarse
                                </button>
                            </div>

                        </form>

                    </div>

                </div>

            </div>

        </main>

        <footer th:replace="general/fragmentos :: footer"></footer>

    </body>
</html>
