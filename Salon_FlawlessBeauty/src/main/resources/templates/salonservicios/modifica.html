<!DOCTYPE html>
<!--
    Encargado para Jose
-->
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="general :: head"></head>

<body>

<header th:replace="general :: header"></header>

<div class="container mt-5">

    <h2 th:text="${servicio.id == null} ? 'Agregar Servicio' : 'Modificar Servicio'"></h2>

    <form th:action="@{/salonservicios/guardar}" 
          th:object="${servicio}" 
          method="post">

        <input type="hidden" th:field="*{id}">

        <div class="mb-3">
            <label class="form-label">Nombre</label>
            <input type="text"
                   class="form-control"
                   th:field="*{nombre}"
                   required>
        </div>

        <div class="mb-3">
            <label class="form-label">Descripción</label>
            <input type="text"
                   class="form-control"
                   th:field="*{descripcion}">
        </div>

        <div class="mb-3">
            <label class="form-label">Precio</label>
            <input type="number"
                   step="0.01"
                   class="form-control"
                   th:field="*{precio}"
                   required>
        </div>

        <div class="mb-3">
            <label class="form-label">Categoría</label>

            <select class="form-select"
                    th:field="*{categoria}">

                <option th:each="c : ${categorias}"
                        th:value="${c.id}"
                        th:text="${c.nombre}">
                </option>

            </select>

        </div>

        <button type="submit" class="btn btn-success">
            Guardar
        </button>

        <a th:href="@{/salonservicios}" 
           class="btn btn-secondary">
            Cancelar
        </a>

    </form>

</div>

<footer th:replace="general :: footer"></footer>

</body>
</html>
