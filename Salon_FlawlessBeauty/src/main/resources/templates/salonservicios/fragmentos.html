<!DOCTYPE html>
<!--
    Encargado para Jose
-->
<html xmlns:th="http://www.thymeleaf.org">

    <head th:replace="~{general/fragmentos :: head}"></head>

    <body>

        <header th:replace="~{general/fragmentos :: header}"></header>

        <section class="container mt-5">

            <div class="row">

                <!-- CATEGORIAS (IZQUIERDA) -->
                <div class="col-md-3">

                    <h4 class="mb-3">Categorías</h4>

                    <div class="list-group">

                        <a th:each="categoria : ${categorias}"
                           href="#"
                           class="list-group-item list-group-item-action"
                           th:text="${categoria.nombre}">
                        </a>

                    </div>

                </div>


                <!-- SERVICIOS (DERECHA) -->
                <div class="col-md-9">

                    <h2 class="mb-4">Servicios del Salón</h2>

                    <div class="row">

                        <div class="col-md-4 mb-4"
                             th:each="servicio : ${servicios}">

                            <div class="card shadow-sm h-100">

                                <div class="card-body">

                                    <h5 class="card-title"
                                        th:text="${servicio.nombre}">
                                    </h5>

                                    <p class="card-text"
                                       th:text="${servicio.descripcion}">
                                    </p>

                                    <p class="fw-bold">
                                        ₡ <span th:text="${servicio.precio}"></span>
                                    </p>

                                    <a th:href="@{/agendarCita(id=${servicio.id})}"
                                       class="btn btn-outline-primary btn-sm">
                                        Agendar cita
                                    </a>

                                </div>

                            </div>

                        </div>

                    </div>

                </div>

            </div>

        </section>

        <footer th:replace="~{general/fragmentos :: footer}"></footer>

    </body>
</html>
