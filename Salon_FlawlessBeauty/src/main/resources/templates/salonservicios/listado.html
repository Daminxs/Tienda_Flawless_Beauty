<!DOCTYPE html>
<!--
    Encargado para Jose
-->
<html xmlns:th="http://www.thymeleaf.org">

    <head th:replace="~{general/fragmentos :: head}"></head>

    <body>

        <header th:replace="~{general/fragmentos :: header}"></header>

        <div class="container-fluid mt-4">

            <div class="row">

                <!-- CATEGORÍAS -->
                <div class="col-md-3">

                    <h4 class="mb-3">Categorías</h4>

                    <div class="list-group">

                        <a th:href="@{/salonservicios}"
                           class="list-group-item list-group-item-action">
                            Todos
                        </a>

                        <a th:each="c : ${categorias}"
                           th:href="@{/salonservicios(categoria=${c.id})}"
                           class="list-group-item list-group-item-action"
                           th:text="${c.nombre}">
                        </a>

                    </div>

                </div>


                <!-- SERVICIOS -->
                <div class="col-md-9">

                    <h2 class="mb-4">Servicios del Salón</h2>

                    <div class="row">

                        <div class="col-md-4 mb-4"
                             th:each="servicio : ${servicios}">

                            <div class="card h-100 shadow-sm">

                                <img th:src="@{/img/servicios/default.jpg}"
                                     class="card-img-top">

                                <div class="card-body">

                                    <h5 class="card-title"
                                        th:text="${servicio.nombre}">
                                    </h5>

                                    <p class="card-text"
                                       th:text="${servicio.descripcion}">
                                    </p>

                                    <p class="fw-bold">
                                        ₡<span th:text="${servicio.precio}"></span>
                                    </p>

                                    <a th:href="@{/agendarCita(id=${servicio.id})}"
                                       class="btn w-100"
                                       style="background-color:#b76e79; color:white; border:none;">
                                        Agendar cita
                                    </a>

                                </div>

                            </div>

                        </div>

                    </div>

                </div>

            </div>

        </div>

        <footer th:replace="~{general/fragmentos :: footer}"></footer>

    </body>
</html>
