<!DOCTYPE html>
<!--
    Encargado para Damian
-->
<html xmlns:th="http://www.thymeleaf.org">

    <!-- HEAD -->
    <head th:fragment="head">

        <meta charset="UTF-8">
        <title>Flawless Beauty</title>

        <link rel="stylesheet"
              href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

        <link rel="stylesheet"
              href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
        
        <style>

        /* fondo */
        body{
        background:white;
        font-family: Arial, Helvetica, sans-serif;
        color:#333;
        }

        /* header */
        header{
        background:white;
        border-top:3px solid #f3d6cf;
        border-bottom:3px solid #f3d6cf;
        }

        /* footer */
        footer{
        background:white;
        border-top:3px solid #f3d6cf;
        border-bottom:3px solid #f3d6cf;
        }

        /* navbar */
        .navbar-brand{
        font-weight:bold;
        color:#b76e79;
        font-size:22px;
        }

        .nav-link{
        color:#444;
        }

        .nav-link:hover{
        color:#d98ea3;
        }

        /* titulos */
        h1,h2,h3{
        color:#b76e79;
        }
        
        </style>

    </head>


    <!-- HEADER -->
    <header th:fragment="header">

        <nav class="navbar navbar-expand-lg">

            <div class="container">

                <a class="navbar-brand" th:href="@{/}">
                    Flawless Beauty
                </a>

                <button class="navbar-toggler"
                        type="button"
                        data-bs-toggle="collapse"
                        data-bs-target="#menu">

                    <span class="navbar-toggler-icon"></span>

                </button>

                <div class="collapse navbar-collapse" id="menu">

                    <ul class="navbar-nav mx-auto">

                        <li class="nav-item">
                            <a class="nav-link" th:href="@{/}">Inicio</a>
                        </li>

                        <li class="nav-item">
                            <a class="nav-link" th:href="@{/salonservicios}">Servicios</a>
                        </li>

                        <li class="nav-item">
                            <a class="nav-link" th:href="@{/salonproductos}">Productos</a>
                        </li>

                        <li class="nav-item">
                            <a class="nav-link" th:href="@{/salonpromociones}">Promociones</a>
                        </li>

                        <li class="nav-item">
                            <a class="nav-link" th:href="@{/saloncontacto}">Contacto</a>
                        </li>

                    </ul>


                    <div class="d-flex gap-3">

                        <a th:href="@{/reservas}" title="Reservas">
                            <i class="bi bi-bag fs-5"></i>
                        </a>

                        <a th:href="@{/verCitas}" title="Ver citas">
                            <i class="bi bi-calendar-check fs-5"></i>
                        </a>

                        <a th:href="@{/agendarCita}" title="Agendar cita">
                            <i class="bi bi-calendar-plus fs-5"></i>
                        </a>

                        <a th:href="@{/perfil}"
                           title="Perfil"
                           th:if="${session.usuario != null}">
                            <i class="bi bi-person-circle fs-5"></i>
                        </a>

                        <a th:href="@{/cuenta}"
                           class="btn btn-outline-secondary btn-sm"
                           th:if="${session.usuario == null}">
                            Cuenta
                        </a>
                        
                    </div>

                </div>

            </div>

        </nav>

    </header>


    <!-- FOOTER -->
    <footer th:fragment="footer">

        <div class="container text-center py-4">

            <p>© 2026 Flawless Beauty</p>
            
            <img th:src="@{/img/footerlogo.jpg}"
                         class="img-fluid rounded shadow">

            <p class="text-muted">
                Belleza, Estilo, Confianza.
            </p>

        </div>

    </footer>

</html>
